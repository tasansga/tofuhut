fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: ^schemas/
      - id: trailing-whitespace
        exclude: ^schemas/
      - id: check-yaml
        exclude: ^schemas/
      - id: check-json
        exclude: ^schemas/
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: [--severity=error]
  - repo: local
    hooks:
      - id: make
        name: Run make
        entry: make
        language: system
        pass_filenames: false
        always_run: true
